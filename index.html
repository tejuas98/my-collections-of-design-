        // --- RENDER CARDS DYNAMICALLY ---
        
        

        function renderCards() {
            const grid = document.getElementById('card-grid');
            if(!grid) return;
            
            grid.innerHTML = '';
            
            window.catalog = {}; // For backward compatibility with existing functions
            
            designs.forEach(design => {
                window.catalog[design.id] = design; // populate catalog
                
                const cardHTML = `
        <div class="product-card break-inside-avoid mb-6 relative cursor-pointer group" data-category="${design.category}" onclick="openPreviewModal('${design.id}')">
            <!-- Hidden elements for modal logic -->
            <div class="hidden">
                <h3>${design.title}</h3>
                <div>${design.category}</div>
                <button id="copy-btn-${design.id}"></button>
                <div class="backface-hidden rotate-y-180"><div class="w-full">${design.metadata_html}</div></div>
            </div>
            
            <!-- Minimal Visual Design -->
            <div class="w-full bg-transparent rounded-xl overflow-hidden transition-all duration-300 hover:shadow-xl hover:-translate-y-1 border border-[var(--arsenal-border)] hover:border-[var(--border-primary)] relative" id="visual-front-${design.id}">
                <div class="visual-wrapper flex justify-start items-start pointer-events-none p-4" style="width: 640px;">
                    ${design.visual_html}
                </div>
            </div>
        </div>`;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
            
            
            
        }


        window.addEventListener('DOMContentLoaded', () => {
            renderCards();
            const savedData = localStorage.getItem('visual_edits');
            if (savedData) {
                try {
                    const edits = JSON.parse(savedData);
                    Object.keys(edits).forEach(id => {
                        const wrapper = document.getElementById('visual-front-' + id)?.querySelector('.visual-wrapper');
                        if (wrapper && edits[id]) {
                            wrapper.innerHTML = edits[id];
                        }
                    });
                } catch(e) { console.error("Could not parse saved visual edits"); }
            }
        });

        

        // --- CART & FLIP LOGIC ---
        function flipCard(id) {
            const flipInner = document.getElementById('flip-inner-' + id);
            flipInner.classList.toggle('rotate-y-180');
        }

        function copyCode(id, event) {
            if (event) event.stopPropagation(); // prevent card flip
            
            const originalWrapper = document.getElementById('visual-front-' + id).querySelector('.visual-wrapper');
            const htmlToCopy = originalWrapper.innerHTML;
            
            navigator.clipboard.writeText(htmlToCopy).then(() => {
                const btn = document.getElementById('copy-btn-' + id);
                if (btn) {
                    const originalHtml = btn.innerHTML;
                    // Change width smoothly and show text
                    btn.style.width = '90px';
                    btn.innerHTML = `<span class="text-[10px] font-mono font-bold text-green-500 tracking-widest whitespace-nowrap">COPIED!</span>`;
                    btn.classList.add('border-green-500', 'bg-green-500/10');
                    
                    setTimeout(() => { 
                        btn.style.width = '';
                        btn.innerHTML = originalHtml; 
                        btn.classList.remove('border-green-500', 'bg-green-500/10');
                    }, 2000);
                }
            }).catch(e => console.error('Failed to copy', e));
        }

        function closePreviewModal() {
            document.body.style.overflow = '';
            const modal = document.getElementById('preview-modal');
            modal.classList.remove('open');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        

        
        // Robust JavaScript scaling to perfectly fit designs into columns without clipping
        function updateCardZooms() {
            const cards = document.querySelectorAll('.product-card');
            const trueWidths = new Map();
            
            // Phase 1: Temporarily hide all 640px wrappers. 
            // Why? Because in CSS multi-column layouts, a fixed-width child will stretch its parent beyond the column width.
            // By hiding them, the containers naturally collapse to the EXACT strict width of the masonry column.
            cards.forEach(card => {
                const wrapper = card.querySelector('.visual-wrapper');
                if (wrapper) wrapper.style.display = 'none';
            });
            
            // Phase 2: Measure the true, un-stretched column widths.
            cards.forEach(card => {
                const container = card.querySelector('[id^="visual-front-"]');
                if (container) {
                    trueWidths.set(container, container.clientWidth);
                }
            });
            
            // Phase 3: Restore wrappers, measure their actual scrollWidth, and apply perfect scaling.
            cards.forEach(card => {
                const wrapper = card.querySelector('.visual-wrapper');
                const container = card.querySelector('[id^="visual-front-"]');
                if (!wrapper || !container) return;
                
                wrapper.style.display = 'flex';
                wrapper.style.transform = 'none'; // reset transform to accurately measure scrollWidth
                
                const containerWidth = trueWidths.get(container);
                if (containerWidth > 0) {
                    const BASE_WIDTH = Math.max(640, wrapper.scrollWidth);
                    let scale = containerWidth / BASE_WIDTH;
                    if (scale > 1) scale = 1; 
                    
                    wrapper.style.transform = `scale(${scale})`;
                    wrapper.style.transformOrigin = 'top left';
                    
                    // Crucial: transform doesn't affect document flow. We MUST set container height manually so the bottom isn't chopped.
                    const scaledHeight = wrapper.scrollHeight * scale;
                    container.style.height = `${scaledHeight}px`;
                }
            });
        }
        
        window.addEventListener('resize', updateCardZooms);


        function openPreviewModal(id) {
            document.body.style.overflow = 'hidden';
            const card = document.querySelector(`.product-card [id^="copy-btn-${id}"]`).closest('.product-card');
            const title = card.querySelector('h3').innerText;
            const category = card.querySelector('h3').nextElementSibling.innerText;
            const backFace = card.querySelector('.backface-hidden.rotate-y-180');
            
            const modal = document.getElementById('preview-modal');
            const contentContainer = document.getElementById('preview-modal-content');
            const visualHtml = document.querySelector('#visual-front-' + id + ' .visual-wrapper').innerHTML;
            
            // Wrap the HTML in the same 600px container used in the grid to guarantee identical, perfect rendering
            contentContainer.innerHTML = `<div class="visual-wrapper flex justify-start items-start pointer-events-auto p-4 mx-auto" style="width: 640px;">${visualHtml}</div>`;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-category').innerText = category;
            
            const metadataContainer = document.getElementById('modal-metadata');
            if(backFace) {
                // Clone the inner content of back face
                const contentWrapper = backFace.querySelector('.w-full');
                if(contentWrapper) {
                    const clonedContent = contentWrapper.cloneNode(true);
                    // Unhide the metadata grid wrapper if it's hidden
                    const hiddenMeta = clonedContent.querySelector('.transparent.hidden');
                    if(hiddenMeta) hiddenMeta.classList.remove('hidden');
                    // Ensure text colors are visible in the modal by switching from hard-coded white to theme variable
                    const whiteTexts = clonedContent.querySelectorAll('.text-white');
                    whiteTexts.forEach(el => { el.classList.remove('text-white'); el.classList.add('text-[var(--text-primary)]'); });
                    
                    const whiteBorders = clonedContent.querySelectorAll('.border-white\\/20');
                    whiteBorders.forEach(el => { el.classList.remove('border-white/20'); el.classList.add('border-[var(--border-primary)]'); });
                    
                    metadataContainer.innerHTML = '';
                    metadataContainer.appendChild(clonedContent);
                } else {
                    metadataContainer.innerHTML = '<div class="text-gray-500 italic">No extra information found</div>';
                }
            } else {
                metadataContainer.innerHTML = '<div class="text-gray-500 italic">No extra information found</div>';
            }
            
            document.getElementById('modal-download-btn').onclick = function() { downloadPNG(id); };

            modal.style.display = 'flex';
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.add('open');

            
        }

        function downloadPNG(id) {
            const element = document.querySelector('#visual-front-' + id + ' .visual-wrapper');
            if(!element) return;
            
            const originalTransform = element.style.transform;
            element.style.transform = 'none'; 
            
            // Wait for transform to apply
            setTimeout(() => {
                if (typeof htmlToImage !== 'undefined') {
                    htmlToImage.toPng(element, { 
                        pixelRatio: 8, 
                        backgroundColor: '#ffffff',
                        style: { transform: 'none' }
                    }).then(dataUrl => {
                        const link = document.createElement('a');
                        link.download = 'original-snapshot-' + id + '.png';
                        link.href = dataUrl;
                        link.click();
                        element.style.transform = originalTransform;
                    }).catch(e => {
                        console.error("Export error", e);
                        element.style.transform = originalTransform;
                    });
                } else {
                    alert("Image export library is still loading. Please try again in a moment.");
                    element.style.transform = originalTransform;
                }
            }, 50);
        }
    

        // --- LIST/GRID VIEW TOGGLE ---
        let currentView = 'grid';
        function setViewMode(mode) {
            currentView = mode;
            const grid = document.getElementById('card-grid');
            const btnGrid = document.getElementById('btn-grid-view');
            const btnList = document.getElementById('btn-list-view');
            
            if(!grid || !btnGrid || !btnList) return;
            
            if (mode === 'list') {
                grid.classList.add('list-view');
                btnList.classList.add('active');
                btnGrid.classList.remove('active');
            } else {
                grid.classList.remove('list-view');
                btnGrid.classList.add('active');
                btnList.classList.remove('active');
            }
            
            // Re-apply scale to fit the new card layouts
            document.querySelectorAll('.visual-wrapper').forEach(wrapper => {
                // simple hack to trigger resize scaling logic (if you have one)
                // The visual-wrapper automatically scales if we resize window
            });
            window.dispatchEvent(new Event('resize'));
        }

        // --- FILTERING & SEARCH LOGIC ---
        function filterCards(category) {
            // Update active state on buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.innerText.trim() === category) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Filter the cards
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                if (category === 'All' || card.getAttribute('data-category') === category) {
                    card.style.display = 'flex'; // It flexes in both layouts
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Clear search when filtering by category
            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.value = '';
        }

        function searchCards() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            
            // Reset category filter buttons visually to "All" if searching
            if(query.length > 0) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    if(btn.innerText.trim() === 'All') btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }

            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const cat = card.getAttribute('data-category').toLowerCase();
                
                if (title.includes(query) || cat.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

</script>
