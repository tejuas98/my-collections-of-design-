<style>
        :root {
            --arsenal-card-bg: #ffffff;
            --arsenal-border: #e5e7eb;
            --arsenal-title: #111827;
            --arsenal-text: #4b5563;
            --bg-primary: #f9fafb;
            --text-primary: #111827;
            --border-primary: #e5e7eb;
            --filter-bg: #111827;
            --filter-text: #ffffff;
        }
        body.dark-theme {
            --arsenal-card-bg: #0a0a0a;
            --arsenal-border: #222222;
            --arsenal-title: #ffffff;
            --arsenal-text: #a1a1aa;
            --bg-primary: #000000;
            --text-primary: #ffffff;
            --border-primary: #222222;
            --filter-bg: #ffffff;
            --filter-text: #000000;
        }
        body { background-color: var(--bg-primary); color: var(--text-primary); transition: background-color 0.3s; }
        
        .product-card {
            background-color: var(--arsenal-card-bg);
            border: 1px solid var(--arsenal-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border-radius: 12px;
        }
        
        .filter-btn {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: var(--arsenal-text);
            padding: 12px 16px;
            margin-right: 12px;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn:hover { color: var(--text-primary); background: rgba(0,0,0,0.05); }
        .filter-btn.active { color: var(--text-primary); background: rgba(0,0,0,0.05); border: 1px solid var(--border-primary); font-weight: 600; }
        body.dark-theme .filter-btn:hover { background: rgba(255,255,255,0.1); }
        body.dark-theme .filter-btn.active { background: rgba(255,255,255,0.1); border: 1px solid var(--border-primary); }

        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        #cart-sidebar {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100vh;
            background-color: var(--arsenal-card-bg);
            border-left: 1px solid var(--arsenal-border);
            box-shadow: -10px 0 20px rgba(0,0,0,0.05);
            transition: right 0.3s ease; z-index: 1000;
            display: flex; flex-direction: column;
        }
        #cart-sidebar.open { right: 0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    
        .nav-blur {
            background-color: rgba(249, 250, 251, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        body.dark-theme .nav-blur {
            background-color: rgba(0, 0, 0, 0.85);
        }
    
        /* Grid & List View Styles */
        #card-grid { transition: all 0.3s ease; }
        
        /* Universal Preview Button */
        

        /* Grid View Specific Styles (Default) */
        #card-grid:not(.list-view) .perspective-1000 {
            height: 240px;
            overflow: hidden;
            border-radius: 8px;
            pointer-events: none;
        }
        #card-grid:not(.list-view) .perspective-1000 .preserve-3d {
            transform: scale(0.6);
            transform-origin: top center;
            width: 166.66%;
            margin-left: -33.33%;
        }

        /* List View Specific Styles */
        #card-grid.list-view { display: flex; flex-direction: column; gap: 0.75rem; }
        #card-grid.list-view .product-card { flex-direction: row; align-items: center; padding: 0.75rem 1.25rem; justify-content: space-between; }
        #card-grid.list-view .product-card > div:first-child { display: flex; flex-direction: row-reverse; justify-content: flex-end; align-items: center; gap: 1.5rem; margin-bottom: 0; flex: 1; overflow: hidden; }
        #card-grid.list-view .product-card .mb-4 { margin-bottom: 0; min-width: 0; }
        #card-grid.list-view .perspective-1000 { display: block !important; width: 140px; height: 80px; margin-bottom: 0; overflow: hidden; border-radius: 6px; flex-shrink: 0; position: relative; border: 1px solid var(--border-primary); pointer-events: none; background: var(--bg-primary); }
        #card-grid.list-view .perspective-1000 .preserve-3d { width: 700px; height: 400px; transform: scale(0.2); transform-origin: top left; }
        #card-grid.list-view .utility-bar { margin-top: 0; padding-top: 0; border-top: none; gap: 0.5rem; flex-shrink: 0; display: flex; justify-content: flex-end;}
        #card-grid.list-view h3 { font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* View Toggle Buttons */
        .view-toggle-btn { padding: 8px; border-radius: 6px; color: var(--arsenal-text); transition: all 0.2s; cursor: pointer; border: none; background: transparent; }
        .view-toggle-btn.active { background-color: var(--border-primary); color: var(--text-primary); }
        .view-toggle-btn:hover:not(.active) { color: var(--text-primary); background-color: rgba(255,255,255,0.05); }
        body.light-theme .view-toggle-btn:hover:not(.active) { background-color: rgba(0,0,0,0.05); }
        
        /* Preview Modal */
        #preview-modal { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; overflow-y: auto; padding: 2rem 0; }
        #preview-modal.open { display: flex; opacity: 1; }

        /* Isolate designs from global theme colors */
        .visual-wrapper, #preview-modal-content { color: #111827; }

/* Hidden Scrollbars */

body {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
}

body::-webkit-scrollbar {
    display: none; /* Chrome, Safari and Opera */
}

</style>

<script>
        
        

        // --- LOAD SAVED EDITS ON BOOT ---
        
        // --- RENDER CARDS DYNAMICALLY ---
        function renderCards() {
            const grid = document.getElementById('card-grid');
            if(!grid) return;
            
            grid.innerHTML = '';
            
            window.catalog = {}; // For backward compatibility with existing functions
            
            designs.forEach(design => {
                window.catalog[design.id] = design; // populate catalog
                
                const cardHTML = `
        <div class="product-card p-6 flex flex-col justify-between research-card relative cursor-pointer hover:border-[var(--text-primary)] transition-all" data-category="${design.category}" onclick="openPreviewModal('${design.id}')">
            <div>
                <div class="mb-4">
                    <h3 class="font-serif font-bold text-2xl text-[var(--arsenal-title)] mb-1">${design.title}</h3>
                    <div class="font-mono text-[11px] font-bold tracking-widest text-[var(--arsenal-text)] uppercase">${design.category}</div>
                </div>
                
                <!-- 3D FLIP CONTAINER -->
                <div class="group perspective-1000 w-full mb-2 cursor-pointer" onclick="flipCard('${design.id}')" title="Click to flip or edit">
                    <div class="relative w-full transition-transform duration-700 preserve-3d grid" id="flip-inner-${design.id}">
                        
                        <!-- FRONT FACE: The Visual -->
                        <div class="col-start-1 row-start-1 backface-hidden w-full flex justify-center items-center bg-transparent p-6 rounded-lg bg-[var(--bg-primary)] border border-[var(--arsenal-border)] hover:border-[var(--arsenal-title)] transition-colors relative overflow-hidden" id="visual-front-${design.id}">
                            <div class="absolute inset-0 bg-gradient-to-br from-[var(--bg-primary)] to-[var(--arsenal-card-bg)] opacity-50 z-0"></div>
                            
                            <div class="visual-wrapper w-full flex justify-center items-center pointer-events-none">
                                ${design.visual_html}
                            </div>
                        </div>
                        
                        <!-- BACK FACE: The Metadata -->
                        <div class="col-start-1 row-start-1 backface-hidden rotate-y-180 w-full flex flex-col justify-center items-start p-6 rounded-lg bg-[var(--bg-primary)] border border-[var(--arsenal-border)] overflow-y-auto z-20">
                            <div class="w-full">
                                ${design.metadata_html}
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>
            
            <!-- Utility Bar -->
            <div class="flex justify-end items-center gap-3 mt-6 pt-4 border-t border-[var(--arsenal-border)] relative z-20 bg-[var(--arsenal-card-bg)] utility-bar" onclick="event.stopPropagation()">
                <button class="bg-transparent border border-[var(--arsenal-border)] text-[var(--text-primary)] hover:bg-[var(--border-primary)] rounded-full p-2.5 transition-all duration-300 z-10 relative flex items-center justify-center overflow-hidden" id="copy-btn-${design.id}" onclick="copyCode('${design.id}', event)" title="Copy HTML Code" style="min-width: 36px; height: 36px;">
                    <div class="flex items-center justify-center transition-all duration-300" id="copy-icon-container-${design.id}">
                        <svg fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </div>
                </button>
                <button class="download-btn bg-transparent border border-[var(--arsenal-border)] text-[var(--text-primary)] hover:bg-[var(--border-primary)] rounded-full p-2.5 transition-colors z-10 relative" onclick="downloadPNG('${design.id}')" title="Download PNG">
                    <svg fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                </button>
            </div>
        </div>`;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }


        window.addEventListener('DOMContentLoaded', () => {
            renderCards();
            const savedData = localStorage.getItem('visual_edits');
            if (savedData) {
                try {
                    const edits = JSON.parse(savedData);
                    Object.keys(edits).forEach(id => {
                        const wrapper = document.getElementById('visual-front-' + id)?.querySelector('.visual-wrapper');
                        if (wrapper && edits[id]) {
                            wrapper.innerHTML = edits[id];
                        }
                    });
                } catch(e) { console.error("Could not parse saved visual edits"); }
            }
        });

        

        // --- CART & FLIP LOGIC ---
        function flipCard(id) {
            const flipInner = document.getElementById('flip-inner-' + id);
            flipInner.classList.toggle('rotate-y-180');
        }

        function copyCode(id, event) {
            if (event) event.stopPropagation(); // prevent card flip
            
            const originalWrapper = document.getElementById('visual-front-' + id).querySelector('.visual-wrapper');
            const htmlToCopy = originalWrapper.innerHTML;
            
            navigator.clipboard.writeText(htmlToCopy).then(() => {
                const btn = document.getElementById('copy-btn-' + id);
                if (btn) {
                    const originalHtml = btn.innerHTML;
                    // Change width smoothly and show text
                    btn.style.width = '90px';
                    btn.innerHTML = `<span class="text-[10px] font-mono font-bold text-green-500 tracking-widest whitespace-nowrap">COPIED!</span>`;
                    btn.classList.add('border-green-500', 'bg-green-500/10');
                    
                    setTimeout(() => { 
                        btn.style.width = '';
                        btn.innerHTML = originalHtml; 
                        btn.classList.remove('border-green-500', 'bg-green-500/10');
                    }, 2000);
                }
            }).catch(e => console.error('Failed to copy', e));
        }

        function closePreviewModal() {
            document.body.style.overflow = '';
            const modal = document.getElementById('preview-modal');
            modal.classList.remove('open');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        function openPreviewModal(id) {
            document.body.style.overflow = 'hidden';
            const card = document.querySelector(`.product-card [id^="copy-btn-${id}"]`).closest('.product-card');
            const title = card.querySelector('h3').innerText;
            const category = card.querySelector('h3').nextElementSibling.innerText;
            const backFace = card.querySelector('.backface-hidden.rotate-y-180');
            
            const modal = document.getElementById('preview-modal');
            const contentContainer = document.getElementById('preview-modal-content');
            const visualHtml = document.querySelector('#visual-front-' + id + ' .visual-wrapper').innerHTML;
            
            contentContainer.innerHTML = visualHtml;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-category').innerText = category;
            
            const metadataContainer = document.getElementById('modal-metadata');
            if(backFace) {
                // Clone the inner content of back face
                const contentWrapper = backFace.querySelector('.w-full');
                if(contentWrapper) {
                    const clonedContent = contentWrapper.cloneNode(true);
                    // Unhide the metadata grid wrapper if it's hidden
                    const hiddenMeta = clonedContent.querySelector('.transparent.hidden');
                    if(hiddenMeta) hiddenMeta.classList.remove('hidden');
                    // Ensure text colors are visible in the modal by switching from hard-coded white to theme variable
                    const whiteTexts = clonedContent.querySelectorAll('.text-white');
                    whiteTexts.forEach(el => { el.classList.remove('text-white'); el.classList.add('text-[var(--text-primary)]'); });
                    
                    metadataContainer.innerHTML = '';
                    metadataContainer.appendChild(clonedContent);
                } else {
                    metadataContainer.innerHTML = '<div class="text-gray-500 italic">No extra information found</div>';
                }
            } else {
                metadataContainer.innerHTML = '<div class="text-gray-500 italic">No extra information found</div>';
            }
            
            document.getElementById('modal-download-btn').onclick = function() { downloadPNG(id); };

            modal.style.display = 'flex';
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.add('open');

            function scaleToFit() {
                if(!modal.classList.contains('open')) return;
                const leftPane = contentContainer.parentElement;
                contentContainer.style.transform = 'none'; // reset to measure accurately
                
                const visualEl = contentContainer.firstElementChild;
                if(visualEl) {
                    // Make sure visual wrapper doesn't restrict to 100% width, so we get true size
                    visualEl.classList.remove('w-full');
                    visualEl.style.width = 'max-content';
                    
                    const availW = leftPane.clientWidth - 32; // account for padding
                    const availH = leftPane.clientHeight - 32;
                    const elW = visualEl.scrollWidth;
                    const elH = visualEl.scrollHeight;
                    
                    if (elW > 0 && elH > 0) {
                        const scale = Math.min(1, availW / elW, availH / elH);
                        contentContainer.style.transform = `scale(${scale})`;
                    }
                }
            }

            // Run immediately and also on resize
            setTimeout(scaleToFit, 10);
            window.addEventListener('resize', scaleToFit);
        }

        function downloadPNG(id) {
            const element = document.querySelector('#visual-front-' + id + ' .visual-wrapper');
            if(!element) return;
            
            const originalTransform = element.style.transform;
            element.style.transform = 'none'; 
            
            // Wait for transform to apply
            setTimeout(() => {
                if (typeof htmlToImage !== 'undefined') {
                    htmlToImage.toPng(element, { 
                        pixelRatio: 8, 
                        backgroundColor: '#ffffff',
                        style: { transform: 'none' }
                    }).then(dataUrl => {
                        const link = document.createElement('a');
                        link.download = 'original-snapshot-' + id + '.png';
                        link.href = dataUrl;
                        link.click();
                        element.style.transform = originalTransform;
                    }).catch(e => {
                        console.error("Export error", e);
                        element.style.transform = originalTransform;
                    });
                } else {
                    alert("Image export library is still loading. Please try again in a moment.");
                    element.style.transform = originalTransform;
                }
            }, 50);
        }
    

        // --- LIST/GRID VIEW TOGGLE ---
        let currentView = 'grid';
        function setViewMode(mode) {
            currentView = mode;
            const grid = document.getElementById('card-grid');
            const btnGrid = document.getElementById('btn-grid-view');
            const btnList = document.getElementById('btn-list-view');
            
            if(!grid || !btnGrid || !btnList) return;
            
            if (mode === 'list') {
                grid.classList.add('list-view');
                btnList.classList.add('active');
                btnGrid.classList.remove('active');
            } else {
                grid.classList.remove('list-view');
                btnGrid.classList.add('active');
                btnList.classList.remove('active');
            }
            
            // Re-apply scale to fit the new card layouts
            document.querySelectorAll('.visual-wrapper').forEach(wrapper => {
                // simple hack to trigger resize scaling logic (if you have one)
                // The visual-wrapper automatically scales if we resize window
            });
            window.dispatchEvent(new Event('resize'));
        }

        // --- FILTERING & SEARCH LOGIC ---
        function filterCards(category) {
            // Update active state on buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.innerText.trim() === category) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Filter the cards
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                if (category === 'All' || card.getAttribute('data-category') === category) {
                    card.style.display = currentView === 'list' ? 'flex' : 'flex'; // It flexes in both layouts
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Clear search when filtering by category
            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.value = '';
        }

        function searchCards() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            
            // Reset category filter buttons visually to "All" if searching
            if(query.length > 0) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    if(btn.innerText.trim() === 'All') btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }

            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const cat = card.getAttribute('data-category').toLowerCase();
                
                if (title.includes(query) || cat.includes(query)) {
                    card.style.display = currentView === 'list' ? 'flex' : 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
